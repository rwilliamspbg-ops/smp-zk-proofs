name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (default features)
        run: cargo test --all-targets

      - name: Test (groth16)
        run: cargo test --all-targets --features groth16

      - name: Test (halo2)
        run: cargo test --all-targets --features halo2

      - name: Test (all features)
        run: cargo test --all-targets --all-features

      - name: Doc tests
        run: cargo test --doc

      - name: Build examples
        run: cargo build --examples

      - name: Build benches
        run: cargo build --benches

      - name: Security audit
        run: |
          cargo install cargo-audit --quiet 2>/dev/null || true
          cargo audit

  release-check:
    runs-on: ubuntu-latest
    needs: rust

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release examples
        run: cargo build --release --examples

      - name: Build release benches
        run: cargo build --release --benches

      - name: Package check (dry run)
        run: cargo package --no-verify
