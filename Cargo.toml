[package]
name = "smp-zk-proofs"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
description = "Verifiable aggregation proofs for Sovereign Map style spatial networks"
license = "MIT"
repository = "https://github.com/rwilliamspbg-ops/smp-zk-proofs"
keywords = ["zk", "proofs", "aggregation", "spatial", "verifiable"]
categories = ["cryptography", "science"]

[dependencies]
bincode = "1.3"
ed25519-dalek = "2.2.0"
serde = { version = "1.0.228", features = ["derive"] }
sha2 = "0.11.0"
thiserror = "2.0.18"

[dev-dependencies]
criterion = "0.8.2"

[[bench]]
name = "proof_benchmarks"
harness = false

[features]
default = []
# Enable the Halo2 proving backend (opt-in). Add real backend deps when ready.
halo2 = []
groth16 = [
	"ark-groth16",
	"ark-bn254",
	"ark-ff",
	"ark-serialize",
	"ark-relations",
	"ark-std",
	"rand",
]

[dependencies.ark-r1cs-std]
version = "0.4"
optional = true

[dependencies.halo2_proofs]
version = "0.1"
optional = true

[package.metadata]
note = "Halo2 feature is opt-in; pinned optional deps are below"

[dependencies.ark-groth16]
version = "0.4"
optional = true

[dependencies.ark-bn254]
version = "0.4"
optional = true

[dependencies.ark-ff]
version = "0.4"
optional = true

[dependencies.ark-serialize]
version = "0.4"
optional = true

[dependencies.ark-relations]
version = "0.4"
optional = true

[dependencies.ark-std]
version = "0.4"
optional = true

[dependencies.rand]
version = "0.8"
optional = true

