[package]
name = "smp-zk-proofs"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
description = "Verifiable aggregation proofs for Sovereign Map style spatial networks"
license = "MIT"
repository = "https://github.com/rwilliamspbg-ops/smp-zk-proofs"
keywords = ["zk", "proofs", "aggregation", "spatial", "verifiable"]
categories = ["cryptography", "science"]

[dependencies]
bincode = "1.3"
ed25519-dalek = "2.2.0"
serde = { version = "1.0.228", features = ["derive"] }
sha2 = "0.11.0"
thiserror = "2.0.18"

[dev-dependencies]
criterion = "0.8.2"

[[bench]]
name = "proof_benchmarks"
harness = false

[features]
default = []
# Enable the Halo2 proving backend (opt-in).
halo2 = ["halo2_proofs", "pasta_curves"]

[dependencies.halo2_proofs]
version = "0.1"
optional = true

[dependencies.pasta_curves]
version = "0.3"
optional = true
