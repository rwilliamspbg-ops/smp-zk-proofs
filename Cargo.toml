[package]
name = "smp-zk-proofs"
version = "0.1.0"
edition = "2024"
description = "Scaffold for verifiable aggregation proofs in Sovereign Map style spatial networks"
license = "MIT"
repository = "https://github.com/rwilliamspbg-ops/smp-zk-proofs"

[dependencies]
bincode = "1.3"
ed25519-dalek = "2.2.0"
serde = { version = "1.0.228", features = ["derive"] }
sha2 = "0.11.0"
thiserror = "2.0.18"

[dev-dependencies]
criterion = "0.8.2"

[[bench]]
name = "proof_benchmarks"
harness = false
