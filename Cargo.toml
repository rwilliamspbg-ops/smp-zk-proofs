license = "MIT"
repository = "https://github.com/rwilliamspbg-ops/smp-zk-proofs"
keywords = ["zk", "proofs", "aggregation", "spatial", "verifiable"]
categories = ["cryptography", "science"]

[dependencies]
# Serialization
bincode = "1.3"
serde = { version = "1.0", features = ["derive"] }

# Hashing
sha2 = "0.11.0"
thiserror = "2.0"

# Arkworks for zk-SNARKs (Groth16)
ark-ff = "0.4"
ark-ec = "0.4"
ark-poly = "0.4"
ark-relations = "0.4"
ark-snark = "0.4"
ark-std = "0.4"
ark-bls12-381 = "0.4"
ark-groth16 = "0.4"
ark-crypto-primitives = "0.4"
ark-serialize = "0.4"

# Post-quantum cryptography (Dilithium)
pqcrypto-dilithium = "0.1"

# Ed25519 for comparison/fallback
ed25519-dalek = "2.2.0"

# Randomness
rand = "0.8"

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "proof_benchmarks"
harness = false

[features]
default = []
# Enable the Halo2 proving backend (opt-in). Add real backend deps when ready.
halo2 = []
groth16 = [
	"ark-groth16",
	"ark-bn254",
	"ark-ff",
	"ark-serialize",
	"ark-relations",
	"ark-std",
	"rand",
	"ark-r1cs-std",
]

[dependencies.ark-r1cs-std]
version = "0.4"
optional = true

[dependencies.halo2_proofs]
version = "0.1"
optional = true

[package.metadata]
note = "Halo2 feature is opt-in; pinned optional deps are below"

[dependencies.ark-groth16]
version = "0.4"
optional = true

[dependencies.ark-bn254]
version = "0.4"
optional = true

[dependencies.ark-ff]
version = "0.4"
optional = true

[dependencies.ark-serialize]
version = "0.4"
optional = true

[dependencies.ark-relations]
version = "0.4"
optional = true

[dependencies.ark-std]
version = "0.4"
optional = true

[dependencies.rand]
version = "0.8"
optional = true

